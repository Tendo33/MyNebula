services:
  # ==================== Database ====================
  db:
    image: pgvector/pgvector:pg16
    container_name: mynebula-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-mynebula}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-mynebula_secret}
      POSTGRES_DB: ${DATABASE_NAME:-mynebula}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-mynebula} -d ${DATABASE_NAME:-mynebula}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mynebula-net

  # ==================== Backend API + Frontend ====================
  api:
    image: simonsun3/mynebula:latest
    container_name: mynebula-api
    env_file:
      - .env
    environment:
      # 内部固定配置，覆盖 .env 中同名变量
      - API_PORT=8000
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_URL=
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mynebula-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mynebula-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
